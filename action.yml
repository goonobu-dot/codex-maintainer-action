name: Codex Maintainer Action
description: Generate Codex-ready OSS maintenance audits, briefs, task queues, review summaries, and JSON artifacts.
author: goonobu-dot

branding:
  icon: clipboard
  color: blue

inputs:
  repo-path:
    description: Repository path to inspect.
    required: false
    default: "."
  output-dir:
    description: Directory where generated maintenance files are written.
    required: false
    default: codex-maintenance
  kit-ref:
    description: Branch, tag, or commit of goonobu-dot/codex-maintainer-kit to install.
    required: false
    default: v0.3.0
  comment-pr:
    description: "Post a short pull request comment with generated artifact paths and maintainer review guidance. Requires pull-requests: write."
    required: false
    default: "false"
  upload-artifact:
    description: Upload generated maintenance files as a workflow artifact.
    required: false
    default: "true"
  artifact-name:
    description: Artifact name for generated maintenance files.
    required: false
    default: codex-maintenance

outputs:
  output-dir:
    description: Directory containing generated maintenance files.
    value: ${{ steps.generate.outputs.output-dir }}
  maintenance-audit:
    description: Path to generated OSS_MAINTENANCE_AUDIT.md.
    value: ${{ steps.generate.outputs.maintenance-audit }}
  maintainer-brief:
    description: Path to generated MAINTAINER_BRIEF.md.
    value: ${{ steps.generate.outputs.maintainer-brief }}
  codex-tasks:
    description: Path to generated CODEX_TASKS.md.
    value: ${{ steps.generate.outputs.codex-tasks }}
  codex-tasks-json:
    description: Path to generated codex-tasks.json.
    value: ${{ steps.generate.outputs.codex-tasks-json }}
  codex-review:
    description: Path to generated CODEX_REVIEW.md.
    value: ${{ steps.generate.outputs.codex-review }}

runs:
  using: composite
  steps:
    - name: Install codex-maintainer-kit
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "git+https://github.com/goonobu-dot/codex-maintainer-kit.git@${{ inputs.kit-ref }}"

    - name: Generate maintenance files
      id: generate
      shell: bash
      run: |
        set -euo pipefail

        output_dir="${{ inputs.output-dir }}"
        repo_path="${{ inputs.repo-path }}"

        mkdir -p "$output_dir"

        codex-maintainer-kit audit "$repo_path" --output "$output_dir/OSS_MAINTENANCE_AUDIT.md"
        codex-maintainer-kit brief "$repo_path" --output "$output_dir/MAINTAINER_BRIEF.md"
        codex-maintainer-kit tasks "$repo_path" --output "$output_dir/CODEX_TASKS.md"
        codex-maintainer-kit tasks "$repo_path" --format json --output "$output_dir/codex-tasks.json"
        codex-maintainer-kit review "$repo_path" --output "$output_dir/CODEX_REVIEW.md"

        {
          echo "output-dir=$output_dir"
          echo "maintenance-audit=$output_dir/OSS_MAINTENANCE_AUDIT.md"
          echo "maintainer-brief=$output_dir/MAINTAINER_BRIEF.md"
          echo "codex-tasks=$output_dir/CODEX_TASKS.md"
          echo "codex-tasks-json=$output_dir/codex-tasks.json"
          echo "codex-review=$output_dir/CODEX_REVIEW.md"
        } >> "$GITHUB_OUTPUT"

    - name: Summarize maintenance artifacts
      id: summary
      shell: bash
      run: |
        set -euo pipefail

        output_dir="${{ inputs.output-dir }}"
        body_file="$RUNNER_TEMP/codex-maintainer-comment.md"

        audit_score="$(grep -m1 '^Health score:' "$output_dir/OSS_MAINTENANCE_AUDIT.md" || true)"
        review_risk="$(grep -m1 '^Risk level:' "$output_dir/CODEX_REVIEW.md" || true)"

        {
          echo "## Codex Maintainer Action"
          echo
          echo "${audit_score:-Health score: not found}"
          echo "${review_risk:-Risk level: not found}"
          echo
          echo "### Generated artifacts"
          echo
          echo "- \`$output_dir/OSS_MAINTENANCE_AUDIT.md\`"
          echo "- \`$output_dir/MAINTAINER_BRIEF.md\`"
          echo "- \`$output_dir/CODEX_TASKS.md\`"
          echo "- \`$output_dir/codex-tasks.json\`"
          echo "- \`$output_dir/CODEX_REVIEW.md\`"
          echo
          echo "### Maintainer rule"
          echo
          echo "Use these artifacts to scope maintenance work, then inspect the actual diff before merge. Do not auto-merge AI-generated changes."
        } | tee "$body_file" >> "$GITHUB_STEP_SUMMARY"

        echo "comment-body=$body_file" >> "$GITHUB_OUTPUT"

    - name: Comment on pull request
      if: ${{ inputs.comment-pr == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh pr comment "${{ github.event.pull_request.number }}" --body-file "${{ steps.summary.outputs.comment-body }}"

    - name: Upload maintenance artifact
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output-dir }}
