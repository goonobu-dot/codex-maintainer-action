name: action-smoke

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./
        with:
          output-dir: codex-maintenance
          upload-artifact: "false"
      - run: test -f codex-maintenance/OSS_MAINTENANCE_AUDIT.md
      - run: test -f codex-maintenance/MAINTAINER_BRIEF.md
      - run: test -f codex-maintenance/CODEX_TASKS.md
      - run: test -f codex-maintenance/codex-tasks.json
      - run: test -f codex-maintenance/CODEX_REVIEW.md
